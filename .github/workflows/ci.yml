name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  format:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: brew install clang-format
      - name: Check formatting
        run: scripts/format.sh --check

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (ninja, pkg-config, llvm for clang-tidy)
        run: brew install ninja pkg-config llvm

      - name: Install Qt (prebuilt)
        uses: jurplel/install-qt-action@v4
        with:
          # 与本地一致(6.11)。6.8 的 QtGui 会链接 AGL,而 AGL 已从新版 macOS SDK 移除,
          # 在 macos-latest(Xcode 26 SDK)上会报 "framework 'AGL' not found"。
          version: '6.11.*'
          cache: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # 必须与 vcpkg.json 的 builtin-baseline 一致,否则 run-vcpkg 找不到 baseline。
          vcpkgGitCommitId: 930ecc42b512b564571d767f70775d284a6fa307

      # 缓存键带上 runner 镜像版本:镜像(编译器/SDK)一更新,vcpkg 的 ABI 哈希就变、
      # 旧预编译包无法复用;若键不含版本,旧键不可变会导致「永久未命中」。
      - name: Compute vcpkg cache tag
        run: echo "VCPKG_CACHE_TAG=${ImageOS:-osx}-${ImageVersion:-0}" >> "$GITHUB_ENV"

      # 缓存 vcpkg 的二进制缓存(按 ABI 哈希寻址的预编译包),命中后跳过 libarchive 编译。
      # 用自有 files 缓存目录,见下方 Configure 的 VCPKG_BINARY_SOURCES。
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_binary_cache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TAG }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TAG }}-

      - name: Configure
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
          # 覆盖 run-vcpkg 默认的 "clear;x-gha":改用我们用 actions/cache 持久化的 files 缓存。
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_binary_cache,readwrite"
        run: cmake --preset default

      - name: Build
        run: cmake --build --preset default

      - name: Test
        run: ctest --test-dir build/default --output-on-failure

      - name: clang-tidy
        run: CLANG_TIDY="$(brew --prefix llvm)/bin/clang-tidy" scripts/tidy.sh --strict
